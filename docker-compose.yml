version: '3.8'

services:
  tsi-shirt-bot:
    build: .
    container_name: tsi_shirt_bot
    restart: unless-stopped
    environment:
      - TZ=Asia/Ho_Chi_Minh
    env_file:
      - .env
    volumes:
      # Mount the state file so that schedule.json survives container restarts
      - ./schedule.json:/app/schedule.json
